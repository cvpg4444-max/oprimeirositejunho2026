:root{
  --bg:#FFFFFF;
  --bg-alt:#EEF8F8;
  --ink:#192524;
  --muted:#3D6463;
  --faint:#7A9594;
  --teal:#0ABAB5;
  --teal-d:#007F7C;
  --teal-m:#3D9E9B;
  --surface:#D4EEEC;
  --border:#A8DFDC;
  --dark:#0D1F1E;
  --headline:#004E49;
  --max:1100px;
  --pad:clamp(1.5rem,5vw,3.5rem);
  --nav-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-weight:400;line-height:1.65;-webkit-font-smoothing:antialiased;}
img{max-width:100%;display:block;object-fit:cover;}
a{color:var(--teal);text-decoration:none;}
a:hover{opacity:.7;}
ul{list-style:none;}

/* ── Language ── */
.lp{display:none;}
[data-lang="pt"] .le{display:none!important;}
[data-lang="pt"] span.lp{display:inline!important;}
[data-lang="pt"] h1.lp,[data-lang="pt"] h2.lp,[data-lang="pt"] h3.lp,[data-lang="pt"] p.lp,[data-lang="pt"] div.lp,[data-lang="pt"] li.lp{display:block!important;}
[data-lang="pt"] .lp{display:block;}
[data-lang="pt"] span.lp{display:inline;}

/* ── Type ── */
h1,h2,h3,h4{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;line-height:1.08;letter-spacing:-.02em;color:var(--headline);}
.display{font-weight:300;font-size:clamp(2.6rem,5.5vw,4.8rem);line-height:1.04;}
.display em{font-style:italic;color:var(--teal);}
h2.sec-title{font-size:clamp(1.8rem,3.8vw,2.9rem);margin-bottom:.35em;}
h3{font-size:clamp(1rem,1.6vw,1.15rem);}
p{font-size:1rem;line-height:1.72;}
p+p{margin-top:.9rem;}
.lead{font-size:clamp(1rem,1.6vw,1.12rem);color:var(--muted);line-height:1.6;}
.eyebrow{display:block;font-size:.68rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--teal-m);margin-bottom:.85rem;}
strong{font-weight:600;}
cite{font-style:normal;font-size:.8rem;color:var(--teal);opacity:.85;}

/* ── Layout ── */
.wrap{width:100%;max-width:var(--max);margin:0 auto;padding:0 var(--pad);}
section{padding:clamp(4rem,9vw,7rem) 0;}
section+section{border-top:1px solid var(--border);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4.5rem);align-items:start;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* ── Nav ── */
nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-in{max-width:var(--max);margin:0 auto;padding:0 var(--pad);height:100%;display:flex;align-items:center;justify-content:space-between;gap:2rem;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-style:italic;font-weight:400;color:var(--ink);}
.nav-logo span{color:var(--teal);}
.nav-links{display:flex;align-items:center;gap:1.75rem;}
.nav-links a{font-size:.84rem;font-weight:500;color:var(--muted);letter-spacing:.02em;transition:color .2s;}
.nav-links a:hover{color:var(--ink);opacity:1;}
.lang-btn{background:none;border:1.5px solid var(--teal);border-radius:6px;padding:.5rem 1.1rem;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;cursor:pointer;color:var(--teal);transition:all .2s;letter-spacing:.04em;}
.lang-btn:hover{background:var(--surface);color:var(--teal-d);border-color:var(--teal-d);}
.lang-btn .active{color:var(--teal-d);font-weight:600;}
@media(max-width:760px){.nav-links{display:none;}}

/* ── Hero ── */
#home{padding:clamp(5rem,12vw,9rem) 0 clamp(3.5rem,8vw,6rem);border-top:none!important;}
.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:3rem;align-items:center;}
.hero-content .display{margin-bottom:1.25rem;}
.hero-sub{font-size:clamp(1rem,1.6vw,1.12rem);color:var(--muted);line-height:1.65;max-width:500px;margin-bottom:.75rem;}
.hero-services{font-size:.82rem;color:var(--teal-m);font-weight:500;letter-spacing:.04em;margin-bottom:2rem;}
.btn-group{display:flex;gap:.9rem;flex-wrap:wrap;}
.btn{display:inline-block;background:var(--teal);color:#fff!important;padding:.85rem 2rem;border-radius:3px;font-size:.875rem;font-weight:600;letter-spacing:.04em;transition:background .2s;opacity:1!important;}
.btn:hover{background:var(--teal-d);}
.btn-ghost{display:inline-block;color:var(--ink)!important;padding:.85rem 2rem;border:1.5px solid var(--border);border-radius:3px;font-size:.875rem;font-weight:600;letter-spacing:.04em;transition:all .2s;opacity:1!important;}
.btn-ghost:hover{border-color:var(--ink);}
